<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>☁️ 云端个人成长规划</title>
    <!-- 引入 Tailwind CSS 美化界面 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .loader { border-top-color: #4f46e5; -webkit-animation: spinner 1.5s linear infinite; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-gray-800">

<div class="max-w-4xl mx-auto p-4 sm:p-6 lg:p-8">
    <header class="mb-8 text-center">
        <h1 class="text-3xl font-bold text-indigo-600">☁️ 云端个人成长规划</h1>
        <p class="text-gray-500 mt-2">数据同步至 Notion · 随时随地访问</p>
    </header>

    <!-- 配置区域 (首次使用需填写) -->
    <div id="config-panel" class="bg-white p-6 rounded-lg shadow-md mb-6 border-l-4 border-yellow-400">
        <h2 class="text-lg font-semibold mb-4">⚙️ 初始配置 (仅需设置一次)</h2>
        <p class="text-sm text-gray-600 mb-4">请输入您的 Notion 信息，数据将保存在您的浏览器缓存中以便下次自动登录。</p>
        <div class="space-y-3">
            <input type="password" id="notion-token" placeholder="Notion Internal Integration Token (secret_...)" class="w-full p-2 border rounded">
            <input type="text" id="notion-db-id" placeholder="Database ID (32位字符)" class="w-full p-2 border rounded">
            <button onclick="saveConfig()" class="w-full bg-indigo-600 text-white py-2 rounded hover:bg-indigo-700">🔒 保存配置并开始</button>
        </div>
        <p class="text-xs text-gray-400 mt-2">提示：Token 和 DB ID 仅存储在您的浏览器本地，不会上传到任何第三方服务器。</p>
    </div>

    <!-- 主界面 (配置后显示) -->
    <div id="app-interface" class="hidden">
        <!-- 标签页 -->
        <div class="flex space-x-2 mb-6 overflow-x-auto">
            <button onclick="switchTab('daily')" class="tab-btn px-4 py-2 bg-indigo-600 text-white rounded-full text-sm font-medium">📅 日规划</button>
            <button onclick="switchTab('resource')" class="tab-btn px-4 py-2 bg-white text-gray-600 rounded-full text-sm font-medium hover:bg-gray-100">📚 资源库</button>
        </div>

        <!-- 日规划模块 -->
        <div id="tab-daily" class="block">
            <div class="bg-white p-6 rounded-lg shadow-md mb-6">
                <h3 class="font-bold text-lg mb-4">添加/更新今日规划</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                    <input type="date" id="plan-date" class="p-2 border rounded">
                    <input type="text" id="plan-title" placeholder="标题 (例如：2026-02-28 复盘)" class="p-2 border rounded">
                </div>
                <textarea id="plan-content" placeholder="今天完成了什么？明天计划做什么？..." class="w-full p-2 border rounded h-32 mb-4"></textarea>
                <button onclick="addEntry('DailyPlan')" id="btn-save-plan" class="bg-indigo-600 text-white px-6 py-2 rounded hover:bg-indigo-700 flex items-center justify-center">
                    <span>💾 保存至 Notion</span>
                </button>
            </div>
            
            <h3 class="font-bold text-lg mb-4">历史记录</h3>
            <div id="daily-list" class="space-y-4"><!-- 列表将在这里渲染 --></div>
        </div>

        <!-- 资源库模块 -->
        <div id="tab-resource" class="hidden">
            <div class="bg-white p-6 rounded-lg shadow-md mb-6">
                <h3 class="font-bold text-lg mb-4">添加新资源</h3>
                <input type="text" id="res-title" placeholder="资源名称 (例如：Qwen3.5 技术报告.pdf)" class="w-full p-2 border rounded mb-4">
                <input type="url" id="res-url" placeholder="链接 (例如：阿里云盘分享链接)" class="w-full p-2 border rounded mb-4">
                <select id="res-tag" class="w-full p-2 border rounded mb-4">
                    <option value="PPT">📊 PPT 演示</option>
                    <option value="PDF">📄 PDF 文档</option>
                    <option value="Video">🎬 视频链接</option>
                    <option value="Link">🔗 其他链接</option>
                </select>
                <textarea id="res-note" placeholder="备注说明" class="w-full p-2 border rounded h-20 mb-4"></textarea>
                <button onclick="addEntry('Resource')" id="btn-save-res" class="bg-green-600 text-white px-6 py-2 rounded hover:bg-green-700 flex items-center justify-center">
                    <span>➕ 添加资源</span>
                </button>
            </div>

            <h3 class="font-bold text-lg mb-4">我的资源库</h3>
            <div id="resource-list" class="space-y-4"><!-- 列表将在这里渲染 --></div>
        </div>
        
        <div class="mt-8 text-center">
             <button onclick="clearConfig()" class="text-xs text-red-400 underline">清除配置信息</button>
        </div>
    </div>
    
    <!-- 加载动画 -->
    <div id="loading" class="hidden fixed inset-0 bg-gray-900 bg-opacity-50 flex items-center justify-center z-50">
        <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12"></div>
    </div>
</div>

<script>
    // --- 核心逻辑 ---
    let TOKEN = '';
    let DB_ID = '';

    // 初始化检查
    window.onload = function() {
        const savedToken = localStorage.getItem('notion_token');
        const savedDb = localStorage.getItem('notion_db_id');
        if (savedToken && savedDb) {
            TOKEN = savedToken;
            DB_ID = savedDb;
            document.getElementById('config-panel').classList.add('hidden');
            document.getElementById('app-interface').classList.remove('hidden');
            document.getElementById('plan-date').valueAsDate = new Date();
            fetchData();
        }
    };

    function saveConfig() {
        const t = document.getElementById('notion-token').value.trim();
        const d = document.getElementById('notion-db-id').value.trim();
        if (!t || !d) return alert('请填写完整信息');
        
        TOKEN = t;
        DB_ID = d;
        localStorage.setItem('notion_token', TOKEN);
        localStorage.setItem('notion_db_id', DB_ID);
        
        document.getElementById('config-panel').classList.add('hidden');
        document.getElementById('app-interface').classList.remove('hidden');
        document.getElementById('plan-date').valueAsDate = new Date();
        fetchData();
    }

    function clearConfig() {
        if(confirm('确定清除配置吗？您需要重新输入 Token。')) {
            localStorage.removeItem('notion_token');
            localStorage.removeItem('notion_db_id');
            location.reload();
        }
    }

    function switchTab(tab) {
        document.getElementById('tab-daily').classList.add('hidden');
        document.getElementById('tab-resource').classList.add('hidden');
        document.querySelectorAll('.tab-btn').forEach(b => {
            b.classList.remove('bg-indigo-600', 'text-white');
            b.classList.add('bg-white', 'text-gray-600');
        });
        
        if (tab === 'daily') {
            document.getElementById('tab-daily').classList.remove('hidden');
            event.target.classList.remove('bg-white', 'text-gray-600');
            event.target.classList.add('bg-indigo-600', 'text-white');
        } else {
            document.getElementById('tab-resource').classList.remove('hidden');
            event.target.classList.remove('bg-white', 'text-gray-600');
            event.target.classList.add('bg-indigo-600', 'text-white');
        }
    }

    // --- Notion API 交互 ---
    
    async function fetchData() {
        showLoading(true);
        try {
            const response = await fetch(`https://api.notion.com/v1/databases/${DB_ID}/query`, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${TOKEN}`,
                    'Notion-Version': '2022-06-28',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    sorts: [{ timestamp: "created_time", direction: "descending" }]
                })
            });

            if (!response.ok) throw new Error('Notion API 请求失败，请检查 Token 和 数据库权限');
            const data = await response.json();
            
            renderData(data.results);
        } catch (error) {
            alert('错误：' + error.message);
            console.error(error);
        } finally {
            showLoading(false);
        }
    }

    function renderData(items) {
        const dailyList = document.getElementById('daily-list');
        const resList = document.getElementById('resource-list');
        dailyList.innerHTML = '';
        resList.innerHTML = '';

        items.forEach(item => {
            const props = item.properties;
            const type = props.Type?.select?.name;
            const title = props.Name?.title[0]?.plain_text || '无标题';
            const date = props.Date?.date?.start || '未指定日期';
            const content = props.Content?.rich_text[0]?.plain_text || '';
            const url = props.URL?.url;
            const tags = props.Tags?.multi_select?.map(t => t.name).join(', ') || '';

            if (type === 'DailyPlan') {
                const card = `
                    <div class="bg-white p-4 rounded shadow border-l-4 border-indigo-500">
                        <div class="flex justify-between items-start">
                            <div>
                                <span class="text-xs text-gray-400">${date}</span>
                                <h4 class="font-bold text-lg">${title}</h4>
                                <p class="text-gray-600 mt-2 whitespace-pre-wrap">${content}</p>
                            </div>
                            <button onclick="deleteItem('${item.id}')" class="text-red-400 hover:text-red-600 text-sm">删除</button>
                        </div>
                    </div>
                `;
                dailyList.innerHTML += card;
            } else if (type === 'Resource') {
                const tagColor = tags.includes('PPT') ? 'bg-yellow-100 text-yellow-800' : 
                                 tags.includes('PDF') ? 'bg-red-100 text-red-800' : 
                                 tags.includes('Video') ? 'bg-blue-100 text-blue-800' : 'bg-gray-100 text-gray-800';
                
                const card = `
                    <div class="bg-white p-4 rounded shadow border-l-4 border-green-500 flex justify-between items-center">
                        <div>
                            <div class="flex items-center gap-2 mb-1">
                                <span class="px-2 py-0.5 rounded text-xs font-bold ${tagColor}">${tags || 'Resource'}</span>
                                <h4 class="font-bold text-lg">${title}</h4>
                            </div>
                            ${url ? `<a href="${url}" target="_blank" class="text-indigo-600 underline text-sm">🔗 访问链接</a>` : ''}
                            ${content ? `<p class="text-gray-500 text-sm mt-1">${content}</p>` : ''}
                        </div>
                        <button onclick="deleteItem('${item.id}')" class="text-red-400 hover:text-red-600 text-sm ml-4">删除</button>
                    </div>
                `;
                resList.innerHTML += card;
            }
        });
    }

    async function addEntry(type) {
        showLoading(true);
        let payload = {
            parent: { database_id: DB_ID },
            properties: {
                "Type": { select: { name: type } }
            }
        };

        if (type === 'DailyPlan') {
            const date = document.getElementById('plan-date').value;
            const title = document.getElementById('plan-title').value || date;
            const content = document.getElementById('plan-content').value;
            
            if (!date) return alert('请选择日期');
            
            payload.properties["Name"] = { title: [{ text: { content: title } }] };
            payload.properties["Date"] = { date: { start: date } };
            payload.properties["Content"] = { rich_text: [{ text: { content: content } }] };
        } else {
            const title = document.getElementById('res-title').value;
            const url = document.getElementById('res-url').value;
            const note = document.getElementById('res-note').value;
            const tag = document.getElementById('res-tag').value;

            if (!title) return alert('请填写资源名称');

            payload.properties["Name"] = { title: [{ text: { content: title } }] };
            if (url) payload.properties["URL"] = { url: url };
            if (note) payload.properties["Content"] = { rich_text: [{ text: { content: note } }] };
            if (tag) payload.properties["Tags"] = { multi_select: [{ name: tag }] };
        }

        try {
            const response = await fetch('https://api.notion.com/v1/pages', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${TOKEN}`,
                    'Notion-Version': '2022-06-28',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            });

            if (!response.ok) throw new Error('添加失败');
            
            alert('保存成功！');
            // 清空输入
            if(type === 'DailyPlan') {
                document.getElementById('plan-content').value = '';
                document.getElementById('plan-title').value = '';
            } else {
                document.getElementById('res-title').value = '';
                document.getElementById('res-url').value = '';
                document.getElementById('res-note').value = '';
            }
            fetchData(); // 刷新列表
        } catch (error) {
            alert('出错啦：' + error.message);
        } finally {
            showLoading(false);
        }
    }

    async function deleteItem(id) {
        if(!confirm('确定删除这条记录吗？')) return;
        showLoading(true);
        try {
            await fetch(`https://api.notion.com/v1/blocks/${id}`, {
                method: 'DELETE',
                headers: {
                    'Authorization': `Bearer ${TOKEN}`,
                    'Notion-Version': '2022-06-28'
                }
            });
            fetchData();
        } catch (e) {
            alert('删除失败');
        } finally {
            showLoading(false);
        }
    }

    function showLoading(show) {
        const el = document.getElementById('loading');
        const btns = document.querySelectorAll('button');
        if (show) {
            el.classList.remove('hidden');
            btns.forEach(b => b.disabled = true);
        } else {
            el.classList.add('hidden');
            btns.forEach(b => b.disabled = false);
        }
    }
</script>
</body>
</html>
