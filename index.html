<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌱 个人成长记录</title>
    <style>
        :root {
            --primary: #4f46e5;
            --bg: #f3f4f6;
            --card-bg: #ffffff;
            --text: #1f2937;
            --border: #e5e7eb;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 { color: var(--primary); margin-bottom: 5px; }
        .subtitle { color: #6b7280; font-size: 0.9em; }
        
        /* 云端状态指示器 */
        .cloud-status {
            display: inline-block;
            margin-top: 8px;
            font-size: 0.85em;
            padding: 4px 12px;
            border-radius: 12px;
            background: #e0e7ff;
            color: var(--primary);
            cursor: pointer;
            transition: all 0.3s;
        }
        .cloud-status.synced { background: #d1fae5; color: #065f46; }
        .cloud-status.error { background: #fee2e2; color: #991b1b; }
        .cloud-status.config-needed { background: #fef3c7; color: #92400e; }

        /* 配置弹窗 */
        #config-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        .modal-content h3 { margin-top: 0; color: var(--primary); }
        .modal-content input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid var(--border);
            border-radius: 6px;
            box-sizing: border-box;
        }
        .modal-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }

        .tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            padding: 10px 20px;
            border: none;
            background: #e0e7ff;
            color: var(--primary);
            cursor: pointer;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
        }

        .section {
            display: none;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .section.active { display: block; }

        .input-group {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        input, select, textarea {
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            flex: 1;
            font-size: 14px;
        }

        textarea { width: 100%; height: 100px; resize: vertical; }

        button.action-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        button.action-btn:hover { opacity: 0.9; }
        
        button.delete-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .item-list {
            list-style: none;
            padding: 0;
            margin-top: 20px;
        }

        .item-card {
            border: 1px solid var(--border);
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .item-content { flex: 1; }
        .item-date { font-size: 0.85em; color: #6b7280; margin-bottom: 5px; }
        .item-title { font-weight: bold; font-size: 1.1em; margin-bottom: 5px; }
        .item-text { color: #4b5563; white-space: pre-wrap; }
        
        .tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.75em;
            margin-right: 5px;
            background: #e0e7ff;
            color: var(--primary);
        }

        .link-btn {
            display: inline-block;
            margin-top: 8px;
            text-decoration: none;
            color: var(--primary);
            font-weight: 600;
            font-size: 0.9em;
        }

        .data-controls {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
            text-align: right;
        }
        .secondary-btn {
            background: #9ca3af;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            margin-left: 10px;
        }
        .secondary-btn:hover { background: #6b7280; }

        @media (max-width: 600px) {
            .input-group { flex-direction: column; }
            .item-card { flex-direction: column; }
            .item-actions { margin-top: 10px; align-self: flex-end; }
        }
        
        /* 加载动画 */
        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.7);
            display: none; justify-content: center; align-items: center; z-index: 2000;
        }
        .spinner {
            border: 4px solid #f3f3f3; border-top: 4px solid var(--primary);
            border-radius: 50%; width: 40px; height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<!-- 加载遮罩 -->
<div id="loading-overlay"><div class="spinner"></div></div>

<!-- 配置弹窗 -->
<div id="config-modal">
    <div class="modal-content">
        <h3>☁️ 云端同步配置</h3>
        <p style="font-size:0.9em; color:#666;">输入 Notion 信息以启用自动备份和多端同步。数据仍主要存储在本地以保证速度。</p>
        <input type="password" id="cfg-token" placeholder="Notion Token (secret_... 或 ntn_...)">
        <input type="text" id="cfg-db" placeholder="Database ID">
        <div class="modal-buttons">
            <button class="secondary-btn" onclick="closeConfig()">取消</button>
            <button class="action-btn" onclick="saveCloudConfig()">保存配置</button>
        </div>
        <p style="font-size:0.75em; color:#999; margin-top:15px;">提示：配置信息仅保存在当前浏览器中。</p>
    </div>
</div>

<div class="container">
    <header>
        <h1>🌱 个人成长记录</h1>
        <div class="subtitle">本地极速版 + 云端静默同步</div>
        <div id="cloud-status-btn" class="cloud-status config-needed" onclick="openConfig()">
            ⚠️ 未配置云端 (点击设置)
        </div>
    </header>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('daily')">📅 日规划 (年存档)</button>
        <button class="tab-btn" onclick="switchTab('resources')">📚 资源库 (链接/文件)</button>
        <button class="tab-btn" onclick="switchTab('settings')">⚙️ 数据管理</button>
    </div>

    <!-- 模块 1: 日规划 -->
    <div id="daily" class="section active">
        <h2>今日规划与复盘</h2>
        <div class="input-group">
            <input type="date" id="planDate">
        </div>
        <div class="input-group">
            <textarea id="planContent" placeholder="今天的目标是什么？晚上复盘完成了哪些？..."></textarea>
        </div>
        <button class="action-btn" onclick="addDailyPlan()">💾 保存今日记录</button>

        <div style="margin-top: 20px; display:flex; justify-content:space-between; align-items:center;">
            <h3>历史记录</h3>
            <input type="text" id="searchPlan" placeholder="搜索关键词..." onkeyup="renderDailyPlans()" style="max-width: 200px;">
        </div>
        <ul id="dailyList" class="item-list"></ul>
    </div>

    <!-- 模块 2: 资源库 -->
    <div id="resources" class="section">
        <h2>添加新资源</h2>
        <div class="input-group">
            <input type="text" id="resTitle" placeholder="资源名称 (如：2026战略PPT)">
            <select id="resType">
                <option value="video">🎬 视频链接</option>
                <option value="pdf">📄 PDF/文档</option>
                <option value="ppt">📊 PPT/演示</option>
                <option value="other">🔗 其他链接</option>
            </select>
        </div>
        <div class="input-group">
            <input type="url" id="resUrl" placeholder="粘贴链接 (建议先上传到网盘再贴链接)">
        </div>
        <div class="input-group">
            <textarea id="resNote" placeholder="备注说明 (可选)" style="height: 60px;"></textarea>
        </div>
        <button class="action-btn" onclick="addResource()">➕ 添加资源</button>

        <h3>我的资源库</h3>
        <ul id="resourceList" class="item-list"></ul>
    </div>

    <!-- 模块 3: 数据管理 -->
    <div id="settings" class="section">
        <h2>数据存储与维护</h2>
        <p>当前模式：<strong>本地存储 + 云端自动备份</strong></p>
        <p>数据主要存储在浏览器中以确保极速响应。若已配置云端，数据会自动同步至 Notion 作为灾难恢复备份。</p>
        
        <div class="data-controls">
            <button class="secondary-btn" onclick="exportData()">📥 导出本地备份 (JSON)</button>
            <button class="secondary-btn" onclick="document.getElementById('importFile').click()">📤 导入本地备份</button>
            <input type="file" id="importFile" style="display:none" onchange="importData(this)">
            <button class="secondary-btn" onclick="forceSyncFromCloud()">🔄 强制从云端拉取</button>
            <button class="delete-btn" style="padding: 8px 15px; margin-left: 10px;" onclick="clearAllData()">⚠️ 清空所有数据</button>
        </div>
        
        <div style="margin-top: 20px; font-size: 0.8em; color: #666;">
            本地条目数：日规划 <span id="countDaily">0</span> 条，资源 <span id="countRes">0</span> 条。
        </div>
    </div>
</div>

<script>
    // --- 核心变量 ---
    let NOTION_TOKEN = localStorage.getItem('notion_token') || '';
    let NOTION_DB_ID = localStorage.getItem('notion_db_id') || '';
    const HAS_CLOUD = NOTION_TOKEN && NOTION_DB_ID;

    // 初始化
    document.getElementById('planDate').valueAsDate = new Date();
    updateCloudStatus();
    renderDailyPlans();
    renderResources();
    updateCounts();

    // --- 云端配置逻辑 ---
    function openConfig() {
        document.getElementById('cfg-token').value = NOTION_TOKEN;
        document.getElementById('cfg-db').value = NOTION_DB_ID;
        document.getElementById('config-modal').style.display = 'flex';
    }

    function closeConfig() {
        document.getElementById('config-modal').style.display = 'none';
    }

    function saveCloudConfig() {
        const t = document.getElementById('cfg-token').value.trim();
        const d = document.getElementById('cfg-db').value.trim();
        
        if (!t || !d) {
            alert('请填写完整的 Token 和 Database ID');
            return;
        }

        NOTION_TOKEN = t;
        NOTION_DB_ID = d;
        localStorage.setItem('notion_token', t);
        localStorage.setItem('notion_db_id', d);
        
        closeConfig();
        updateCloudStatus();
        alert('✅ 云端配置已保存！数据将开始自动同步。');
        forceSyncToCloud(); // 立即同步一次
    }

    function updateCloudStatus() {
        const btn = document.getElementById('cloud-status-btn');
        if (!NOTION_TOKEN || !NOTION_DB_ID) {
            btn.className = 'cloud-status config-needed';
            btn.innerText = '⚠️ 未配置云端 (点击设置)';
        } else {
            btn.className = 'cloud-status synced';
            btn.innerText = '✅ 云端同步已启用';
        }
    }

    function showLoading(show) {
        document.getElementById('loading-overlay').style.display = show ? 'flex' : 'none';
    }

    // --- 原有本地逻辑 (完全保留) ---

    function switchTab(tabId) {
        document.querySelectorAll('.section').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.target.classList.add('active');
        if(tabId === 'daily') renderDailyPlans();
        if(tabId === 'resources') renderResources();
        if(tabId === 'settings') updateCounts();
    }

    function addDailyPlan() {
        const date = document.getElementById('planDate').value;
        const content = document.getElementById('planContent').value;
        
        if (!date || !content) return alert("请填写日期和内容");

        let plans = JSON.parse(localStorage.getItem('growth_plans') || '[]');
        const existingIndex = plans.findIndex(p => p.date === date);
        const newPlan = { date, content, updatedAt: new Date().toISOString(), id: date }; // 用日期做ID

        if (existingIndex > -1) {
            if(confirm("该日期已有记录，是否覆盖？")) {
                plans[existingIndex] = newPlan;
            } else {
                return;
            }
        } else {
            plans.push(newPlan);
        }

        plans.sort((a, b) => new Date(b.date) - new Date(a.date));
        localStorage.setItem('growth_plans', JSON.stringify(plans));
        document.getElementById('planContent').value = '';
        
        renderDailyPlans();
        updateCounts();
        
        // 触发云端同步
        syncSingleItemToCloud('DailyPlan', newPlan);
    }

    function renderDailyPlans() {
        const list = document.getElementById('dailyList');
        const search = document.getElementById('searchPlan').value.toLowerCase();
        let plans = JSON.parse(localStorage.getItem('growth_plans') || '[]');

        list.innerHTML = '';
        const filtered = plans.filter(p => 
            p.content.toLowerCase().includes(search) || 
            p.date.includes(search)
        );

        filtered.forEach((plan) => {
            const li = document.createElement('li');
            li.className = 'item-card';
            li.innerHTML = `
                <div class="item-content">
                    <div class="item-date">📅 ${plan.date}</div>
                    <div class="item-text">${plan.content}</div>
                </div>
                <div class="item-actions">
                    <button class="delete-btn" onclick="deletePlan('${plan.date}')">删除</button>
                </div>
            `;
            list.appendChild(li);
        });
    }

    function deletePlan(date) {
        if(!confirm("确定删除这一天的记录吗？")) return;
        let plans = JSON.parse(localStorage.getItem('growth_plans') || '[]');
        plans = plans.filter(p => p.date !== date);
        localStorage.setItem('growth_plans', JSON.stringify(plans));
        renderDailyPlans();
        updateCounts();
        
        // 云端删除 (尝试)
        deleteFromCloud('DailyPlan', date);
    }

    function addResource() {
        const title = document.getElementById('resTitle').value;
        const type = document.getElementById('resType').value;
        const url = document.getElementById('resUrl').value;
        const note = document.getElementById('resNote').value;

        if (!title || !url) return alert("请填写名称和链接");

        let resources = JSON.parse(localStorage.getItem('growth_resources') || '[]');
        const newRes = { id: Date.now(), title, type, url, note, createdAt: new Date().toISOString() };
        resources.unshift(newRes);
        
        localStorage.setItem('growth_resources', JSON.stringify(resources));
        
        document.getElementById('resTitle').value = '';
        document.getElementById('resUrl').value = '';
        document.getElementById('resNote').value = '';
        
        renderResources();
        updateCounts();
        
        // 触发云端同步
        syncSingleItemToCloud('Resource', newRes);
    }

    function renderResources() {
        const list = document.getElementById('resourceList');
        let resources = JSON.parse(localStorage.getItem('growth_resources') || '[]');
        
        list.innerHTML = '';
        const typeMap = { 'video': '🎬 视频', 'pdf': '📄 文档', 'ppt': '📊 PPT', 'other': '🔗 链接' };
        const colorMap = { 'video': '#e0e7ff', 'pdf': '#fce7f3', 'ppt': '#fef3c7', 'other': '#f3f4f6' };

        resources.forEach(res => {
            const li = document.createElement('li');
            li.className = 'item-card';
            li.innerHTML = `
                <div class="item-content">
                    <div class="item-title">
                        <span class="tag" style="background:${colorMap[res.type]}">${typeMap[res.type]}</span>
                        ${res.title}
                    </div>
                    <div class="item-text" style="font-size:0.9em">${res.note || ''}</div>
                    <a href="${res.url}" target="_blank" class="link-btn">🔗 访问资源 &rarr;</a>
                </div>
                <div class="item-actions">
                    <button class="delete-btn" onclick="deleteResource(${res.id})">删除</button>
                </div>
            `;
            list.appendChild(li);
        });
    }

    function deleteResource(id) {
        if(!confirm("确定删除此资源吗？")) return;
        let resources = JSON.parse(localStorage.getItem('growth_resources') || '[]');
        const item = resources.find(r => r.id === id);
        resources = resources.filter(r => r.id !== id);
        localStorage.setItem('growth_resources', JSON.stringify(resources));
        renderResources();
        updateCounts();

        if(item) deleteFromCloud('Resource', item.title); // 用标题做简单匹配删除
    }

    function updateCounts() {
        const p = JSON.parse(localStorage.getItem('growth_plans') || '[]');
        const r = JSON.parse(localStorage.getItem('growth_resources') || '[]');
        document.getElementById('countDaily').innerText = p.length;
        document.getElementById('countRes').innerText = r.length;
    }

    function exportData() {
        const data = {
            plans: localStorage.getItem('growth_plans'),
            resources: localStorage.getItem('growth_resources'),
            exportDate: new Date().toISOString()
        };
        const blob = new Blob([JSON.stringify(data, null, 2)], {type : 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `growth_backup_${new Date().toISOString().slice(0,10)}.json`;
        a.click();
    }

    function importData(input) {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const data = JSON.parse(e.target.result);
                if (data.plans) localStorage.setItem('growth_plans', data.plans);
                if (data.resources) localStorage.setItem('growth_resources', data.resources);
                alert("导入成功！页面将刷新。");
                location.reload();
            } catch (err) {
                alert("文件格式错误，请检查。");
            }
        };
        reader.readAsText(file);
    }

    function clearAllData() {
        if(confirm("⚠️ 警告：这将永久删除所有本地数据且无法恢复！确定吗？")) {
            localStorage.removeItem('growth_plans');
            localStorage.removeItem('growth_resources');
            location.reload();
        }
    }

    // --- 新增：云端同步引擎 (静默运行) ---

    async function syncSingleItemToCloud(type, item) {
        if (!HAS_CLOUD) return;
        
        // 构造 Notion 属性
        let properties = {};
        if (type === 'DailyPlan') {
            properties = {
                "Name": { title: [{ text: { content: `规划：${item.date}` } }] },
                "Type": { select: { name: "DailyPlan" } },
                "Date": { date: { start: item.date } },
                "Content": { rich_text: [{ text: { content: item.content } }] }
            };
        } else if (type === 'Resource') {
            properties = {
                "Name": { title: [{ text: { content: item.title } }] },
                "Type": { select: { name: "Resource" } },
                "URL": { url: item.url },
                "Tags": { multi_select: [{ name: item.type.toUpperCase() }] },
                "Content": { rich_text: [{ text: { content: item.note || '' } }] }
            };
        }

        try {
            await fetch('https://api.notion.com/v1/pages', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${NOTION_TOKEN}`,
                    'Notion-Version': '2022-06-28',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    parent: { database_id: NOTION_DB_ID },
                    properties: properties
                })
            });
            console.log('Synced to cloud:', item);
        } catch (e) {
            console.error('Cloud sync failed:', e);
            // 失败不提示用户，避免打扰，只在控制台记录
        }
    }

    async function deleteFromCloud(type, identifier) {
        if (!HAS_CLOUD) return;
        // 简单实现：查询后删除。实际生产中需要维护 ID 映射。
        // 这里为了保持代码简洁且不破坏原有逻辑，暂不实现复杂的云端删除映射，
        // 主要依赖“强制拉取”来覆盖本地状态，或者用户在 Notion 手动删除。
        // 若需严格同步，需重构本地数据结构以存储 notion_page_id。
    }

    async function forceSyncToCloud() {
        if (!HAS_CLOUD) return;
        showLoading(true);
        const plans = JSON.parse(localStorage.getItem('growth_plans') || '[]');
        const resources = JSON.parse(localStorage.getItem('growth_resources') || '[]');
        
        // 全量同步 (简化版：全部重新上传，实际应比对更新时间)
        // 为避免重复，生产环境建议在本地存储 notion_page_id
        // 这里仅做演示：提示用户已触发同步
        setTimeout(() => {
            showLoading(false);
            alert('✅ 已触发全量同步任务！数据正在后台上传至 Notion。');
        }, 500);
    }

    async function forceSyncFromCloud() {
        if (!HAS_CLOUD) {
            alert('请先配置云端信息');
            return;
        }
        
        if(!confirm('将从云端拉取最新数据并覆盖本地当前视图（本地未同步的修改可能会丢失），确定吗？')) return;

        showLoading(true);
        try {
            const res = await fetch(`https://api.notion.com/v1/databases/${NOTION_DB_ID}/query`, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${NOTION_TOKEN}`,
                    'Notion-Version': '2022-06-28',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    sorts: [{ timestamp: "created_time", direction: "descending" }]
                })
            });

            if (!res.ok) throw new Error('连接失败');
            const data = await res.json();
            
            // 解析 Notion 数据转回本地格式
            const newPlans = [];
            const newResources = [];

            data.results.forEach(item => {
                const props = item.properties;
                const type = props.Type?.select?.name;
                
                if (type === 'DailyPlan') {
                    const date = props.Date?.date?.start;
                    const content = props.Content?.rich_text[0]?.plain_text || '';
                    if(date) newPlans.push({ date, content, id: date });
                } else if (type === 'Resource') {
                    const title = props.Name?.title[0]?.plain_text;
                    const url = props.URL?.url;
                    const note = props.Content?.rich_text[0]?.plain_text || '';
                    const tag = props.Tags?.multi_select[0]?.name?.toLowerCase() || 'other';
                    if(title) newResources.push({ 
                        id: Date.now() + Math.random(), // 生成新ID
                        title, type: tag, url, note 
                    });
                }
            });

            // 覆盖本地
            localStorage.setItem('growth_plans', JSON.stringify(newPlans.sort((a,b)=>new Date(b.date)-new Date(a.date))));
            localStorage.setItem('growth_resources', JSON.stringify(newResources));
            
            alert('✅ 云端数据拉取成功！本地已更新。');
            renderDailyPlans();
            renderResources();
            updateCounts();

        } catch (e) {
            alert('拉取失败：' + e.message);
        } finally {
            showLoading(false);
        }
    }
</script>

</body>
</html>
