<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>个人成长记录 | Personal Growth Record</title>
<!-- Tailwind CSS -->
<script src="https://image.uc.cn/s/uae/g/3n/mos-production/0915/3.4.17.js"></script>
<!-- Font Awesome -->
<script src="https://image.uc.cn/s/uae/g/3n/mos-production/fontawesome-free-7.1.0-web/js/all.min.js"></script>
<link href="https://image.uc.cn/s/uae/g/3n/mos-production/fontawesome-free-7.1.0-web/css/fontawesome.min.css" rel="stylesheet"/>
<!-- Canvas Confetti -->
<script src="https://image.uc.cn/s/uae/g/3n/mos-production/cdn.jsdelivr.net/npm/canvas-confetti/1.6.0/dist/confetti.browser.min.js"></script>
<style>
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1; 
        }
        ::-webkit-scrollbar-thumb {
            background: #c1c1c1; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #a8a8a8; 
        }

        /* Transitions */
        .fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Checkbox Custom Style */
        .custom-checkbox input:checked + div {
            background-color: #10b981;
            border-color: #10b981;
        }
        .custom-checkbox input:checked + div svg {
            display: block;
        }
        
        /* Calendar Grid */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }

        /* Modal Overlay */
        .modal-overlay {
            background-color: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(2px);
        }

        /* Drag and Drop Visuals */
        .draggable-source {
            opacity: 0.4;
            border: 2px dashed #3b82f6;
        }
        .draggable-over {
            border-top: 2px solid #3b82f6;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans h-screen flex flex-col overflow-hidden">
<!-- Toast Notification Container -->
<div class="fixed top-5 right-5 z-50 flex flex-col gap-2" id="toast-container"></div>
<!-- Modal Container -->
<div class="fixed inset-0 z-40 hidden flex items-center justify-center modal-overlay" id="modal-container">
<!-- Modal content injected via JS -->
</div>
<!-- Top Navigation -->
<header class="bg-white shadow-sm h-16 flex items-center justify-between px-6 z-20 flex-shrink-0">
<div class="flex items-center gap-3">
<div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold">
<i class="fa-solid fa-seedling"></i>
</div>
<h1 class="text-xl font-bold text-gray-800 tracking-tight">GrowthRecord</h1>
</div>
<nav class="flex gap-1 bg-gray-100 p-1 rounded-lg">
<button class="px-4 py-2 rounded-md text-sm font-medium transition-all duration-200 bg-white text-blue-600 shadow-sm" id="nav-planning" onclick="switchModule('planning')">
<i class="fa-solid fa-calendar-check mr-2"></i>规划
            </button>
<button class="px-4 py-2 rounded-md text-sm font-medium transition-all duration-200 text-gray-600 hover:text-gray-900 hover:bg-gray-200" id="nav-learning" onclick="switchModule('learning')">
<i class="fa-solid fa-graduation-cap mr-2"></i>学习
            </button>
</nav>
<div class="flex items-center gap-3">
<button class="text-gray-500 hover:text-blue-600 text-sm font-medium transition-colors" onclick="exportData()" title="导出数据">
<i class="fa-solid fa-download"></i>
</button>
<label class="text-gray-500 hover:text-blue-600 text-sm font-medium transition-colors cursor-pointer" for="import-file" title="导入数据">
<i class="fa-solid fa-upload"></i>
</label>
<input accept=".json" class="hidden" id="import-file" onchange="importData(this)" type="file"/>
</div>
</header>
<div class="flex flex-1 overflow-hidden">
<!-- Sidebar -->
<aside class="w-64 bg-white border-r border-gray-200 flex flex-col flex-shrink-0 transition-all duration-300" id="sidebar">
<!-- Sidebar Content Injected via JS -->
</aside>
<!-- Main Content Area -->
<main class="flex-1 overflow-y-auto bg-gray-50 p-6 relative" id="main-content">
<!-- Main Content Injected via JS -->
</main>
</div>
<script>
        // --- 1. State Management & Data Structure ---
        const DB_KEY = 'growth_record_v1';
        
        const defaultData = {
            planning: {
                year: {},
                quarter: {},
                month: {},
                week: {},
                day: {} // Key: "YYYY-MM-DD", Value: [{id, text, done}]
            },
            learning: {
                domains: [] // [{id, name, subcategories: [{id, name, resources: []}]}]
            }
        };

        let store = JSON.parse(localStorage.getItem(DB_KEY)) || defaultData;
        let currentModule = 'planning'; // 'planning' or 'learning'
        let currentPlanningLevel = 'day'; // 'year', 'quarter', 'month', 'week', 'day'
        let currentDate = new Date(); // For calendar navigation
        let selectedDateKey = formatDateKey(new Date()); // For daily planning
        
        // Learning Navigation State
        let learningPath = { domainId: null, subcategoryId: null }; 

        function saveData() {
            localStorage.setItem(DB_KEY, JSON.stringify(store));
        }

        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2);
        }

        // --- 2. Utility Functions ---
        
        function formatDateKey(date) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        function getWeekNumber(d) {
            d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
            d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay()||7));
            var yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1));
            var weekNo = Math.ceil(( ( (d - yearStart) / 86400000) + 1)/7);
            return weekNo;
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const colors = type === 'success' ? 'bg-green-500' : (type === 'error' ? 'bg-red-500' : 'bg-blue-500');
            const icon = type === 'success' ? 'fa-check-circle' : (type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle');
            
            toast.className = `${colors} text-white px-4 py-3 rounded shadow-lg flex items-center gap-3 min-w-[200px] fade-in transform transition-all duration-300`;
            toast.innerHTML = `<i class="fa-solid ${icon}"></i> <span>${message}</span>`;
            
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100%)';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function showModal(contentHTML) {
            const container = document.getElementById('modal-container');
            container.innerHTML = `
                <div class="bg-white rounded-xl shadow-2xl w-full max-w-md p-6 fade-in transform transition-all scale-100" onclick="event.stopPropagation()">
                    ${contentHTML}
                </div>
            `;
            container.classList.remove('hidden');
            container.onclick = () => closeModal();
        }

        function closeModal() {
            document.getElementById('modal-container').classList.add('hidden');
        }

        // --- 3. Module Switching & Layout ---

        function switchModule(moduleName) {
            currentModule = moduleName;
            
            // Update Nav Styles
            const navPlanning = document.getElementById('nav-planning');
            const navLearning = document.getElementById('nav-learning');
            
            if (moduleName === 'planning') {
                navPlanning.className = "px-4 py-2 rounded-md text-sm font-medium transition-all duration-200 bg-white text-blue-600 shadow-sm";
                navLearning.className = "px-4 py-2 rounded-md text-sm font-medium transition-all duration-200 text-gray-600 hover:text-gray-900 hover:bg-gray-200";
                renderSidebar();
                renderMainContent();
            } else {
                navLearning.className = "px-4 py-2 rounded-md text-sm font-medium transition-all duration-200 bg-white text-blue-600 shadow-sm";
                navPlanning.className = "px-4 py-2 rounded-md text-sm font-medium transition-all duration-200 text-gray-600 hover:text-gray-900 hover:bg-gray-200";
                // Reset learning path if switching back
                learningPath = { domainId: null, subcategoryId: null };
                renderSidebar();
                renderMainContent();
            }
        }

        // --- 4. Planning Module Logic ---

        function renderSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.innerHTML = '';

            if (currentModule === 'planning') {
                const levels = [
                    { id: 'year', icon: 'fa-calendar-days', label: '年规划' },
                    { id: 'quarter', icon: 'fa-calendar', label: '季规划' },
                    { id: 'month', icon: 'fa-calendar-week', label: '月规划' },
                    { id: 'week', icon: 'fa-calendar-day', label: '周规划' },
                    { id: 'day', icon: 'fa-clock', label: '日规划' }
                ];

                levels.forEach(level => {
                    const btn = document.createElement('button');
                    const isActive = currentPlanningLevel === level.id;
                    btn.className = `w-full text-left px-4 py-3 flex items-center gap-3 transition-colors ${isActive ? 'bg-blue-50 text-blue-600 border-r-4 border-blue-600' : 'text-gray-600 hover:bg-gray-50'}`;
                    btn.innerHTML = `<i class="fa-solid ${level.icon} w-5"></i> ${level.label}`;
                    btn.onclick = () => {
                        currentPlanningLevel = level.id;
                        renderSidebar();
                        renderMainContent();
                    };
                    sidebar.appendChild(btn);
                });
            } else {
                // Learning Sidebar: Domain List
                const header = document.createElement('div');
                header.className = "p-4 border-b border-gray-100 flex justify-between items-center";
                header.innerHTML = `<span class="text-xs font-bold text-gray-400 uppercase tracking-wider">知识领域</span>`;
                sidebar.appendChild(header);

                const addBtn = document.createElement('button');
                addBtn.className = "m-4 w-full py-2 border-2 border-dashed border-gray-300 text-gray-500 rounded-lg hover:border-blue-500 hover:text-blue-500 transition-colors text-sm flex items-center justify-center gap-2";
                addBtn.innerHTML = `<i class="fa-solid fa-plus"></i> 添加领域`;
                addBtn.onclick = () => promptAddDomain();
                sidebar.appendChild(addBtn);

                const list = document.createElement('div');
                list.className = "flex-1 overflow-y-auto";
                
                store.learning.domains.forEach(domain => {
                    const item = document.createElement('div');
                    const isActive = learningPath.domainId === domain.id;
                    item.className = `px-4 py-3 cursor-pointer flex justify-between items-center group ${isActive ? 'bg-blue-50 text-blue-700' : 'text-gray-700 hover:bg-gray-50'}`;
                    item.innerHTML = `
                        <span class="font-medium truncate"><i class="fa-solid fa-folder mr-2 text-gray-400"></i>${domain.name}</span>
                        <button class="text-gray-400 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity" onclick="deleteDomain('${domain.id}', event)">
                            <i class="fa-solid fa-trash text-xs"></i>
                        </button>
                    `;
                    item.onclick = (e) => {
                        if(e.target.closest('button')) return;
                        learningPath.domainId = domain.id;
                        learningPath.subcategoryId = null;
                        renderSidebar();
                        renderMainContent();
                    };
                    list.appendChild(item);
                });
                sidebar.appendChild(list);
            }
        }

        function renderMainContent() {
            const main = document.getElementById('main-content');
            main.innerHTML = '';

            if (currentModule === 'planning') {
                renderPlanningContent(main);
            } else {
                renderLearningContent(main);
            }
        }

        // --- Planning Content Renderer ---

        function renderPlanningContent(container) {
            const today = new Date();
            const year = today.getFullYear();
            const month = today.getMonth() + 1;
            const quarter = Math.ceil(month / 3);
            const week = getWeekNumber(today);

            let title = '';
            let dataKey = '';
            let items = [];

            switch(currentPlanningLevel) {
                case 'year':
                    title = `${year} 年度规划`;
                    dataKey = `${year}`;
                    items = store.planning.year[dataKey] || [];
                    break;
                case 'quarter':
                    title = `${year} 年第 ${quarter} 季度规划`;
                    dataKey = `${year}-Q${quarter}`;
                    items = store.planning.quarter[dataKey] || [];
                    break;
                case 'month':
                    title = `${year} 年 ${month} 月规划`;
                    dataKey = `${year}-${String(month).padStart(2,'0')}`;
                    items = store.planning.month[dataKey] || [];
                    break;
                case 'week':
                    title = `${year} 年第 ${week} 周规划`;
                    dataKey = `${year}-W${String(week).padStart(2,'0')}`;
                    items = store.planning.week[dataKey] || [];
                    break;
                case 'day':
                    title = `${selectedDateKey} 日规划`;
                    dataKey = selectedDateKey;
                    items = store.planning.day[dataKey] || [];
                    break;
            }

            // Header
            const header = document.createElement('div');
            header.className = "flex justify-between items-end mb-6";
            header.innerHTML = `
                <div>
                    <h2 class="text-2xl font-bold text-gray-800">${title}</h2>
                    <p class="text-gray-500 text-sm mt-1">保持专注，持续成长</p>
                </div>
                <div class="flex gap-2">
                     ${currentPlanningLevel === 'day' ? `
                        <button onclick="changeDate(-1)" class="p-2 bg-white border border-gray-300 rounded hover:bg-gray-50"><i class="fa-solid fa-chevron-left"></i></button>
                        <input type="date" value="${selectedDateKey}" onchange="updateSelectedDate(this.value)" class="px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <button onclick="changeDate(1)" class="p-2 bg-white border border-gray-300 rounded hover:bg-gray-50"><i class="fa-solid fa-chevron-right"></i></button>
                     ` : ''}
                </div>
            `;
            container.appendChild(header);

            // Day View Special Layout (Calendar + List)
            if (currentPlanningLevel === 'day') {
                const dayLayout = document.createElement('div');
                dayLayout.className = "grid grid-cols-1 lg:grid-cols-3 gap-6";
                
                // Calendar Column
                const calendarCol = document.createElement('div');
                calendarCol.className = "bg-white p-4 rounded-xl shadow-sm border border-gray-100 h-fit";
                calendarCol.innerHTML = `
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="font-bold text-gray-700">${currentDate.getFullYear()}年 ${currentDate.getMonth()+1}月</h3>
                        <div class="flex gap-1">
                            <button onclick="changeMonth(-1)" class="w-6 h-6 flex items-center justify-center hover:bg-gray-100 rounded"><i class="fa-solid fa-chevron-left text-xs"></i></button>
                            <button onclick="changeMonth(1)" class="w-6 h-6 flex items-center justify-center hover:bg-gray-100 rounded"><i class="fa-solid fa-chevron-right text-xs"></i></button>
                        </div>
                    </div>
                    <div class="calendar-grid text-center text-sm">
                        <div class="text-gray-400 text-xs py-1">日</div>
                        <div class="text-gray-400 text-xs py-1">一</div>
                        <div class="text-gray-400 text-xs py-1">二</div>
                        <div class="text-gray-400 text-xs py-1">三</div>
                        <div class="text-gray-400 text-xs py-1">四</div>
                        <div class="text-gray-400 text-xs py-1">五</div>
                        <div class="text-gray-400 text-xs py-1">六</div>
                        ${generateCalendarDays()}
                    </div>
                `;
                dayLayout.appendChild(calendarCol);

                // Task List Column
                const listCol = document.createElement('div');
                listCol.className = "lg:col-span-2 space-y-4";
                
                // Add Task Input
                const inputGroup = document.createElement('div');
                inputGroup.className = "flex gap-2";
                inputGroup.innerHTML = `
                    <input type="text" id="new-task-input" placeholder="添加新的规划任务..." class="flex-1 px-4 py-3 rounded-lg border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-shadow">
                    <button onclick="addTask('${currentPlanningLevel}', '${dataKey}')" class="bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700 transition-colors font-medium shadow-sm">
                        <i class="fa-solid fa-plus mr-1"></i> 添加
                    </button>
                `;
                // Allow Enter key to submit
                setTimeout(() => {
                    const input = document.getElementById('new-task-input');
                    if(input) input.addEventListener('keypress', (e) => {
                        if(e.key === 'Enter') addTask(currentPlanningLevel, dataKey);
                    });
                }, 0);
                
                listCol.appendChild(inputGroup);

                // Task List
                const taskList = document.createElement('div');
                taskList.className = "space-y-2";
                if (items.length === 0) {
                    taskList.innerHTML = `<div class="text-center py-10 text-gray-400 bg-white rounded-xl border border-dashed border-gray-300">暂无规划，开始添加吧！</div>`;
                } else {
                    items.forEach((item, index) => {
                        const el = createTaskElement(item, index, currentPlanningLevel, dataKey);
                        taskList.appendChild(el);
                    });
                }
                listCol.appendChild(taskList);
                dayLayout.appendChild(listCol);
                container.appendChild(dayLayout);

            } else {
                // Standard List View for Year/Quarter/Month/Week
                const inputGroup = document.createElement('div');
                inputGroup.className = "flex gap-2 mb-6";
                inputGroup.innerHTML = `
                    <input type="text" id="new-task-input" placeholder="添加新的规划目标..." class="flex-1 px-4 py-3 rounded-lg border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-shadow">
                    <button onclick="addTask('${currentPlanningLevel}', '${dataKey}')" class="bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700 transition-colors font-medium shadow-sm">
                        <i class="fa-solid fa-plus mr-1"></i> 添加
                    </button>
                `;
                setTimeout(() => {
                    const input = document.getElementById('new-task-input');
                    if(input) input.addEventListener('keypress', (e) => {
                        if(e.key === 'Enter') addTask(currentPlanningLevel, dataKey);
                    });
                }, 0);
                container.appendChild(inputGroup);

                const taskList = document.createElement('div');
                taskList.className = "space-y-3 max-w-3xl";
                if (items.length === 0) {
                    taskList.innerHTML = `<div class="text-center py-10 text-gray-400 bg-white rounded-xl border border-dashed border-gray-300">该阶段暂无规划，开始添加吧！</div>`;
                } else {
                    items.forEach((item, index) => {
                        const el = createTaskElement(item, index, currentPlanningLevel, dataKey);
                        taskList.appendChild(el);
                    });
                }
                container.appendChild(taskList);
            }
        }

        function generateCalendarDays() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            
            let html = '';
            
            // Empty slots for previous month
            for (let i = 0; i < firstDay; i++) {
                html += `<div></div>`;
            }
            
            // Days
            for (let i = 1; i <= daysInMonth; i++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
                const isSelected = dateStr === selectedDateKey;
                const isToday = dateStr === formatDateKey(new Date());
                const hasTasks = store.planning.day[dateStr] && store.planning.day[dateStr].length > 0;
                const allDone = hasTasks && store.planning.day[dateStr].every(t => t.done);

                let classes = "h-8 w-8 mx-auto flex items-center justify-center rounded-full text-sm cursor-pointer transition-colors relative ";
                if (isSelected) {
                    classes += "bg-blue-600 text-white font-bold shadow-md";
                } else if (isToday) {
                    classes += "border border-blue-600 text-blue-600 font-bold";
                } else {
                    classes += "hover:bg-gray-100 text-gray-700";
                }

                html += `
                    <div class="${classes}" onclick="selectDate('${dateStr}')">
                        ${i}
                        ${hasTasks ? `<span class="absolute bottom-0.5 w-1 h-1 rounded-full ${allDone ? 'bg-green-400' : 'bg-orange-400'}"></span>` : ''}
                    </div>
                `;
            }
            return html;
        }

        function createTaskElement(item, index, level, key) {
            const div = document.createElement('div');
            div.className = "bg-white p-4 rounded-lg border border-gray-100 shadow-sm flex items-center gap-3 group hover:shadow-md transition-all";
            div.draggable = true;
            
            // Drag Events
            div.ondragstart = (e) => {
                e.dataTransfer.setData('text/plain', index);
                div.classList.add('draggable-source');
            };
            div.ondragend = () => div.classList.remove('draggable-source');
            div.ondragover = (e) => {
                e.preventDefault();
                div.classList.add('draggable-over');
            };
            div.ondragleave = () => div.classList.remove('draggable-over');
            div.ondrop = (e) => {
                e.preventDefault();
                div.classList.remove('draggable-over');
                const fromIndex = parseInt(e.dataTransfer.getData('text/plain'));
                const toIndex = index;
                if (fromIndex !== toIndex) {
                    moveTask(level, key, fromIndex, toIndex);
                }
            };

            div.innerHTML = `
                <div class="cursor-grab text-gray-300 hover:text-gray-500"><i class="fa-solid fa-grip-vertical"></i></div>
                <label class="custom-checkbox flex items-center cursor-pointer flex-1">
                    <input type="checkbox" class="hidden" ${item.done ? 'checked' : ''} onchange="toggleTask('${level}', '${key}', '${item.id}')">
                    <div class="w-6 h-6 border-2 border-gray-300 rounded-md flex items-center justify-center mr-3 transition-colors">
                        <svg class="w-4 h-4 text-white hidden pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                    </div>
                    <span class="${item.done ? 'line-through text-gray-400' : 'text-gray-700'} font-medium transition-all">${item.text}</span>
                </label>
                <button onclick="deleteTask('${level}', '${key}', '${item.id}')" class="text-gray-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-all p-2">
                    <i class="fa-solid fa-trash"></i>
                </button>
            `;
            return div;
        }

        // --- Planning Actions ---

        function selectDate(dateStr) {
            selectedDateKey = dateStr;
            currentDate = new Date(dateStr);
            renderMainContent();
        }

        function updateSelectedDate(val) {
            selectDate(val);
        }

        function changeDate(offset) {
            const d = new Date(selectedDateKey);
            d.setDate(d.getDate() + offset);
            selectDate(formatDateKey(d));
        }

        function changeMonth(offset) {
            currentDate.setMonth(currentDate.getMonth() + offset);
            renderMainContent();
        }

        function addTask(level, key) {
            const input = document.getElementById('new-task-input');
            const text = input.value.trim();
            if (!text) return;

            if (!store.planning[level][key]) {
                store.planning[level][key] = [];
            }

            store.planning[level][key].push({
                id: generateId(),
                text: text,
                done: false
            });

            saveData();
            input.value = '';
            renderMainContent();
            showToast('添加成功');
        }

        function toggleTask(level, key, id) {
            const list = store.planning[level][key];
            const item = list.find(i => i.id === id);
            if (item) {
                item.done = !item.done;
                saveData();
                renderMainContent();
                if (item.done) {
                    confetti({
                        particleCount: 50,
                        spread: 60,
                        origin: { y: 0.7 },
                        colors: ['#10b981', '#3b82f6']
                    });
                }
            }
        }

        function deleteTask(level, key, id) {
            showModal(`
                <h3 class="text-lg font-bold text-gray-800 mb-2">确认删除</h3>
                <p class="text-gray-600 mb-6">确定要删除这条规划吗？此操作无法撤销。</p>
                <div class="flex justify-end gap-3">
                    <button onclick="closeModal()" class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg">取消</button>
                    <button onclick="confirmDeleteTask('${level}', '${key}', '${id}')" class="px-4 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600">删除</button>
                </div>
            `);
        }

        function confirmDeleteTask(level, key, id) {
            store.planning[level][key] = store.planning[level][key].filter(i => i.id !== id);
            saveData();
            closeModal();
            renderMainContent();
            showToast('已删除', 'info');
        }

        function moveTask(level, key, fromIndex, toIndex) {
            const list = store.planning[level][key];
            const [movedItem] = list.splice(fromIndex, 1);
            list.splice(toIndex, 0, movedItem);
            saveData();
            renderMainContent();
        }

        // --- 5. Learning Module Logic ---

        function renderLearningContent(container) {
            const { domainId, subcategoryId } = learningPath;

            // Breadcrumbs
            const breadcrumbs = document.createElement('div');
            breadcrumbs.className = "flex items-center gap-2 text-sm mb-6 text-gray-500";
            let bcHtml = `<span class="cursor-pointer hover:text-blue-600" onclick="navigateLearning(null, null)">学习库</span>`;
            
            if (domainId) {
                const domain = store.learning.domains.find(d => d.id === domainId);
                if (domain) {
                    bcHtml += ` <i class="fa-solid fa-chevron-right text-xs"></i> <span class="cursor-pointer hover:text-blue-600" onclick="navigateLearning('${domainId}', null)">${domain.name}</span>`;
                }
                if (subcategoryId) {
                    const sub = domain.subcategories.find(s => s.id === subcategoryId);
                    if (sub) {
                        bcHtml += ` <i class="fa-solid fa-chevron-right text-xs"></i> <span class="text-gray-800 font-medium">${sub.name}</span>`;
                    }
                }
            }
            breadcrumbs.innerHTML = bcHtml;
            container.appendChild(breadcrumbs);

            // View Logic
            if (!domainId) {
                // View: List of Domains (Empty state handled by sidebar mostly, but main area can show stats or welcome)
                container.innerHTML += `
                    <div class="text-center py-20 bg-white rounded-xl border border-dashed border-gray-300">
                        <div class="w-16 h-16 bg-blue-50 text-blue-500 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl">
                            <i class="fa-solid fa-layer-group"></i>
                        </div>
                        <h2 class="text-xl font-bold text-gray-800 mb-2">选择一个领域开始</h2>
                        <p class="text-gray-500">点击左侧侧边栏的领域，或创建一个新领域。</p>
                    </div>
                `;
            } else if (!subcategoryId) {
                // View: List of Subcategories
                renderSubcategoryList(container, domainId);
            } else {
                // View: Resource List
                renderResourceList(container, domainId, subcategoryId);
            }
        }

        function navigateLearning(dId, sId) {
            learningPath.domainId = dId;
            learningPath.subcategoryId = sId;
            renderSidebar();
            renderMainContent();
        }

        function renderSubcategoryList(container, domainId) {
            const domain = store.learning.domains.find(d => d.id === domainId);
            if (!domain) return navigateLearning(null, null);

            const header = document.createElement('div');
            header.className = "flex justify-between items-center mb-6";
            header.innerHTML = `
                <h2 class="text-2xl font-bold text-gray-800">${domain.name}</h2>
                <button onclick="promptAddSubcategory('${domainId}')" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 shadow-sm text-sm">
                    <i class="fa-solid fa-plus mr-1"></i> 新建分类
                </button>
            `;
            container.appendChild(header);

            const grid = document.createElement('div');
            grid.className = "grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4";

            if (domain.subcategories.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-10 text-gray-400">暂无分类，请点击右上角添加。</div>`;
            } else {
                domain.subcategories.forEach(sub => {
                    const card = document.createElement('div');
                    card.className = "bg-white p-6 rounded-xl border border-gray-200 shadow-sm hover:shadow-md transition-all cursor-pointer group relative";
                    card.onclick = () => navigateLearning(domainId, sub.id);
                    card.innerHTML = `
                        <div class="flex justify-between items-start mb-2">
                            <div class="w-10 h-10 bg-indigo-50 text-indigo-500 rounded-lg flex items-center justify-center">
                                <i class="fa-solid fa-folder-open"></i>
                            </div>
                            <button onclick="deleteSubcategory('${domainId}', '${sub.id}', event)" class="text-gray-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity">
                                <i class="fa-solid fa-trash"></i>
                            </button>
                        </div>
                        <h3 class="font-bold text-gray-800 text-lg">${sub.name}</h3>
                        <p class="text-gray-400 text-sm mt-1">${sub.resources.length} 个资源</p>
                    `;
                    grid.appendChild(card);
                });
            }
            container.appendChild(grid);
        }

        function renderResourceList(container, domainId, subcategoryId) {
            const domain = store.learning.domains.find(d => d.id === domainId);
            const sub = domain.subcategories.find(s => s.id === subcategoryId);

            const header = document.createElement('div');
            header.className = "flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-6";
            header.innerHTML = `
                <div>
                    <h2 class="text-2xl font-bold text-gray-800">${sub.name}</h2>
                    <p class="text-gray-500 text-sm">${domain.name} / ${sub.name}</p>
                </div>
                <div class="flex gap-2">
                    <input type="text" id="resource-search" placeholder="搜索资源..." class="px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" onkeyup="filterResources()">
                    <button onclick="promptAddResource('${domainId}', '${subcategoryId}')" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 shadow-sm text-sm whitespace-nowrap">
                        <i class="fa-solid fa-plus mr-1"></i> 添加资源
                    </button>
                </div>
            `;
            container.appendChild(header);

            const list = document.createElement('div');
            list.id = "resource-list";
            list.className = "space-y-3";
            
            renderResourceItems(list, sub.resources);

            container.appendChild(list);
        }

        function renderResourceItems(container, resources) {
            container.innerHTML = '';
            if (resources.length === 0) {
                container.innerHTML = `<div class="text-center py-10 text-gray-400 bg-white rounded-xl border border-dashed border-gray-300">暂无资源，点击右上角添加。</div>`;
                return;
            }

            resources.forEach((res, index) => {
                let icon = 'fa-link';
                let colorClass = 'text-blue-500 bg-blue-50';
                let details = '';

                if (res.type === 'book') {
                    icon = 'fa-book';
                    colorClass = 'text-amber-600 bg-amber-50';
                    details = `<div class="text-xs text-gray-500 mt-1">作者: ${res.author || '未知'} | 格式: ${res.format || '未知'}</div>`;
                } else if (res.type === 'video') {
                    icon = 'fa-video';
                    colorClass = 'text-red-500 bg-red-50';
                    details = `<div class="text-xs text-gray-500 mt-1">平台: ${res.platform || '未知'}</div>`;
                } else {
                    details = `<div class="text-xs text-blue-400 mt-1 truncate">${res.url}</div>`;
                }

                const item = document.createElement('div');
                item.className = "bg-white p-4 rounded-lg border border-gray-200 shadow-sm flex items-start gap-4 group";
                item.innerHTML = `
                    <div class="w-10 h-10 rounded-lg flex-shrink-0 flex items-center justify-center ${colorClass}">
                        <i class="fa-solid ${icon}"></i>
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="flex justify-between items-start">
                            <h4 class="font-bold text-gray-800 truncate">${res.title}</h4>
                            <div class="flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                                <button onclick="editResource('${res.id}')" class="text-gray-400 hover:text-blue-500"><i class="fa-solid fa-pen"></i></button>
                                <button onclick="deleteResource('${res.id}')" class="text-gray-400 hover:text-red-500"><i class="fa-solid fa-trash"></i></button>
                            </div>
                        </div>
                        <p class="text-sm text-gray-600 mt-1 line-clamp-2">${res.desc || ''}</p>
                        ${details}
                    </div>
                    ${res.url ? `<a href="${res.url}" target="_blank" class="mt-2 px-3 py-1 text-xs border border-gray-200 rounded text-gray-600 hover:bg-gray-50 hover:text-blue-600 transition-colors">访问</a>` : ''}
                `;
                container.appendChild(item);
            });
        }

        function filterResources() {
            const query = document.getElementById('resource-search').value.toLowerCase();
            const domain = store.learning.domains.find(d => d.id === learningPath.domainId);
            const sub = domain.subcategories.find(s => s.id === learningPath.subcategoryId);
            
            const filtered = sub.resources.filter(r => 
                r.title.toLowerCase().includes(query) || 
                (r.desc && r.desc.toLowerCase().includes(query))
            );
            renderResourceItems(document.getElementById('resource-list'), filtered);
        }

        // --- Learning Actions (CRUD) ---

        function promptAddDomain() {
            showModal(`
                <h3 class="text-lg font-bold text-gray-800 mb-4">添加新领域</h3>
                <input type="text" id="domain-name-input" class="w-full px-4 py-2 border rounded-lg mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="例如：编程、设计、语言">
                <div class="flex justify-end gap-3">
                    <button onclick="closeModal()" class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg">取消</button>
                    <button onclick="confirmAddDomain()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">保存</button>
                </div>
            `);
            setTimeout(() => document.getElementById('domain-name-input').focus(), 100);
        }

        function confirmAddDomain() {
            const name = document.getElementById('domain-name-input').value.trim();
            if (!name) return;
            store.learning.domains.push({ id: generateId(), name, subcategories: [] });
            saveData();
            closeModal();
            renderSidebar();
            showToast('领域添加成功');
        }

        function deleteDomain(id, e) {
            e.stopPropagation();
            showModal(`
                <h3 class="text-lg font-bold text-gray-800 mb-2">删除领域</h3>
                <p class="text-gray-600 mb-6">删除该领域将同时删除其下所有子分类和资源，确定继续吗？</p>
                <div class="flex justify-end gap-3">
                    <button onclick="closeModal()" class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg">取消</button>
                    <button onclick="confirmDeleteDomain('${id}')" class="px-4 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600">删除</button>
                </div>
            `);
        }

        function confirmDeleteDomain(id) {
            store.learning.domains = store.learning.domains.filter(d => d.id !== id);
            if (learningPath.domainId === id) navigateLearning(null, null);
            saveData();
            closeModal();
            renderSidebar();
            renderMainContent();
            showToast('领域已删除', 'info');
        }

        function promptAddSubcategory(domainId) {
            showModal(`
                <h3 class="text-lg font-bold text-gray-800 mb-4">添加新分类</h3>
                <input type="text" id="sub-name-input" class="w-full px-4 py-2 border rounded-lg mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="例如：前端开发、UI设计">
                <div class="flex justify-end gap-3">
                    <button onclick="closeModal()" class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg">取消</button>
                    <button onclick="confirmAddSubcategory('${domainId}')" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">保存</button>
                </div>
            `);
            setTimeout(() => document.getElementById('sub-name-input').focus(), 100);
        }

        function confirmAddSubcategory(domainId) {
            const name = document.getElementById('sub-name-input').value.trim();
            if (!name) return;
            const domain = store.learning.domains.find(d => d.id === domainId);
            domain.subcategories.push({ id: generateId(), name, resources: [] });
            saveData();
            closeModal();
            renderMainContent();
            showToast('分类添加成功');
        }

        function deleteSubcategory(domainId, subId, e) {
            e.stopPropagation();
            showModal(`
                <h3 class="text-lg font-bold text-gray-800 mb-2">删除分类</h3>
                <p class="text-gray-600 mb-6">确定删除此分类及其所有资源吗？</p>
                <div class="flex justify-end gap-3">
                    <button onclick="closeModal()" class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg">取消</button>
                    <button onclick="confirmDeleteSubcategory('${domainId}', '${subId}')" class="px-4 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600">删除</button>
                </div>
            `);
        }

        function confirmDeleteSubcategory(domainId, subId) {
            const domain = store.learning.domains.find(d => d.id === domainId);
            domain.subcategories = domain.subcategories.filter(s => s.id !== subId);
            saveData();
            closeModal();
            renderMainContent();
            showToast('分类已删除', 'info');
        }

        function promptAddResource(domainId, subId, editRes = null) {
            const isEdit = !!editRes;
            const title = isEdit ? '编辑资源' : '添加资源';
            
            // Generate Type Options
            const types = ['link', 'book', 'video'];
            const typeLabels = { link: '网址链接', book: '图书资源', video: '视频资源' };
            
            let typeOptions = types.map(t => 
                `<option value="${t}" ${editRes && editRes.type === t ? 'selected' : ''}>${typeLabels[t]}</option>`
            ).join('');

            showModal(`
                <h3 class="text-lg font-bold text-gray-800 mb-4">${title}</h3>
                <div class="space-y-3 max-h-[70vh] overflow-y-auto pr-2">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">资源类型</label>
                        <select id="res-type" onchange="toggleResFields()" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                            ${typeOptions}
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">标题</label>
                        <input type="text" id="res-title" value="${editRes ? editRes.title : ''}" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div id="field-url">
                        <label class="block text-sm font-medium text-gray-700 mb-1">链接地址</label>
                        <input type="text" id="res-url" value="${editRes ? (editRes.url || '') : ''}" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div id="field-author" class="hidden">
                        <label class="block text-sm font-medium text-gray-700 mb-1">作者</label>
                        <input type="text" id="res-author" value="${editRes ? (editRes.author || '') : ''}" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div id="field-format" class="hidden">
                        <label class="block text-sm font-medium text-gray-700 mb-1">格式描述</label>
                        <input type="text" id="res-format" value="${editRes ? (editRes.format || '') : ''}" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div id="field-platform" class="hidden">
                        <label class="block text-sm font-medium text-gray-700 mb-1">平台</label>
                        <input type="text" id="res-platform" value="${editRes ? (editRes.platform || '') : ''}" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">描述</label>
                        <textarea id="res-desc" rows="3" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">${editRes ? (editRes.desc || '') : ''}</textarea>
                    </div>
                </div>
                <div class="flex justify-end gap-3 mt-6">
                    <button onclick="closeModal()" class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg">取消</button>
                    <button onclick="confirmSaveResource('${domainId}', '${subId}', ${isEdit ? `'${editRes.id}'` : 'null'})" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">保存</button>
                </div>
            `);
            setTimeout(toggleResFields, 50); // Init fields visibility
        }

        function toggleResFields() {
            const type = document.getElementById('res-type').value;
            document.getElementById('field-url').classList.toggle('hidden', type === 'book'); // Books might not have URL if local, but let's keep it flexible. Assuming book has URL for purchase/download or local note.
            // Actually let's refine:
            // Link: URL
            // Book: Author, Format, (URL optional)
            // Video: Platform, URL
            
            const urlField = document.getElementById('field-url');
            const authorField = document.getElementById('field-author');
            const formatField = document.getElementById('field-format');
            const platformField = document.getElementById('field-platform');

            urlField.classList.remove('hidden');
            authorField.classList.add('hidden');
            formatField.classList.add('hidden');
            platformField.classList.add('hidden');

            if (type === 'book') {
                authorField.classList.remove('hidden');
                formatField.classList.remove('hidden');
            } else if (type === 'video') {
                platformField.classList.remove('hidden');
            }
        }

        function confirmSaveResource(domainId, subId, resId) {
            const type = document.getElementById('res-type').value;
            const title = document.getElementById('res-title').value.trim();
            const url = document.getElementById('res-url').value.trim();
            const desc = document.getElementById('res-desc').value.trim();
            
            if (!title) return showToast('标题不能为空', 'error');

            const resourceData = {
                id: resId || generateId(),
                type,
                title,
                url,
                desc,
                author: type === 'book' ? document.getElementById('res-author').value : null,
                format: type === 'book' ? document.getElementById('res-format').value : null,
                platform: type === 'video' ? document.getElementById('res-platform').value : null
            };

            const domain = store.learning.domains.find(d => d.id === domainId);
            const sub = domain.subcategories.find(s => s.id === subId);

            if (resId) {
                const idx = sub.resources.findIndex(r => r.id === resId);
                sub.resources[idx] = resourceData;
                showToast('资源已更新');
            } else {
                sub.resources.push(resourceData);
                showToast('资源已添加');
            }

            saveData();
            closeModal();
            renderMainContent();
        }

        function editResource(resId) {
            const domain = store.learning.domains.find(d => d.id === learningPath.domainId);
            const sub = domain.subcategories.find(s => s.id === learningPath.subcategoryId);
            const res = sub.resources.find(r => r.id === resId);
            if (res) {
                promptAddResource(learningPath.domainId, learningPath.subcategoryId, res);
            }
        }

        function deleteResource(resId) {
            showModal(`
                <h3 class="text-lg font-bold text-gray-800 mb-2">删除资源</h3>
                <p class="text-gray-600 mb-6">确定删除此资源吗？</p>
                <div class="flex justify-end gap-3">
                    <button onclick="closeModal()" class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg">取消</button>
                    <button onclick="confirmDeleteResource('${resId}')" class="px-4 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600">删除</button>
                </div>
            `);
        }

        function confirmDeleteResource(resId) {
            const domain = store.learning.domains.find(d => d.id === learningPath.domainId);
            const sub = domain.subcategories.find(s => s.id === learningPath.subcategoryId);
            sub.resources = sub.resources.filter(r => r.id !== resId);
            saveData();
            closeModal();
            renderMainContent();
            showToast('资源已删除', 'info');
        }

        // --- 6. Data Export/Import ---

        function exportData() {
            const dataStr = JSON.stringify(store, null, 2);
            const blob = new Blob([dataStr], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `growth_record_backup_${formatDateKey(new Date())}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showToast('数据导出成功');
        }

        function importData(input) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const json = JSON.parse(e.target.result);
                    if (json.planning && json.learning) {
                        store = json;
                        saveData();
                        // Refresh UI
                        renderSidebar();
                        renderMainContent();
                        showToast('数据导入成功');
                    } else {
                        throw new Error('Invalid format');
                    }
                } catch (err) {
                    showToast('导入失败：文件格式不正确', 'error');
                }
                input.value = ''; // Reset input
            };
            reader.readAsText(file);
        }

        // --- Init ---
        window.onload = function() {
            renderSidebar();
            renderMainContent();
        };

    </script>
</body>
</html>
