<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌱 个人成长记录 (云端版)</title>
    <style>
        :root {
            --primary: #4f46e5;
            --bg: #f3f4f6;
            --card-bg: #ffffff;
            --text: #1f2937;
            --border: #e5e7eb;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        .container { max-width: 1000px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 30px; }
        h1 { color: var(--primary); margin-bottom: 5px; }
        .subtitle { color: #6b7280; font-size: 0.9em; }

        /* 配置面板样式 */
        #config-panel {
            background: #fffbeb;
            border: 1px solid #fcd34d;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none; /* 默认隐藏，有配置则不显示 */
        }
        #config-panel input {
            width: 100%;
            padding: 8px;
            margin: 5px 0 15px 0;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        #config-panel button {
            background: #d97706;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
        }

        .tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            padding: 10px 20px;
            border: none;
            background: #e0e7ff;
            color: var(--primary);
            cursor: pointer;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .tab-btn.active { background: var(--primary); color: white; }

        .section {
            display: none;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .section.active { display: block; }

        .input-group { margin-bottom: 15px; display: flex; gap: 10px; flex-wrap: wrap; }
        input, select, textarea {
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            flex: 1;
            font-size: 14px;
        }
        textarea { width: 100%; height: 100px; resize: vertical; }

        button.action-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }
        button.action-btn:disabled { background: #ccc; cursor: not-allowed; }
        button.action-btn:hover:not(:disabled) { opacity: 0.9; }
        
        button.delete-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .item-list { list-style: none; padding: 0; margin-top: 20px; }
        .item-card {
            border: 1px solid var(--border);
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .item-content { flex: 1; }
        .item-date { font-size: 0.85em; color: #6b7280; margin-bottom: 5px; }
        .item-title { font-weight: bold; font-size: 1.1em; margin-bottom: 5px; }
        .item-text { color: #4b5563; white-space: pre-wrap; }
        
        .tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.75em;
            margin-right: 5px;
            background: #e0e7ff;
            color: var(--primary);
        }

        .link-btn {
            display: inline-block;
            margin-top: 8px;
            text-decoration: none;
            color: var(--primary);
            font-weight: 600;
            font-size: 0.9em;
        }

        .data-controls {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
            text-align: right;
        }
        .secondary-btn {
            background: #9ca3af;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
        }
        
        #loading {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.8);
            display: none; justify-content: center; align-items: center; z-index: 999;
        }
        .spinner {
            border: 4px solid #f3f3f3; border-top: 4px solid var(--primary);
            border-radius: 50%; width: 40px; height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        @media (max-width: 600px) {
            .input-group { flex-direction: column; }
            .item-card { flex-direction: column; }
            .item-actions { margin-top: 10px; align-self: flex-end; }
        }
    </style>
</head>
<body>

<div id="loading"><div class="spinner"></div></div>

<div class="container">
    <!-- 配置面板 (首次使用显示) -->
    <div id="config-panel">
        <h3 style="margin-top:0">⚙️ 云端配置 (仅需一次)</h3>
        <p style="font-size:0.9em; color:#666;">请输入 Notion Token 和 Database ID 以启用云端同步。</p>
        <input type="password" id="cfg-token" placeholder="Secret Token (secret_...)">
        <input type="text" id="cfg-db" placeholder="Database ID">
        <button onclick="saveConfig()">💾 保存并连接云端</button>
        <p style="font-size:0.8em; color:#999; margin-top:10px;">提示：配置信息仅保存在您当前浏览器的 LocalStorage 中，用于连接您的 Notion。</p>
    </div>

    <header>
        <h1>🌱 个人成长记录</h1>
        <div class="subtitle">云端同步版 · 日规划 · 资源库</div>
        <div id="status-indicator" style="font-size:0.8em; color:green; display:none;">✅ 已连接云端</div>
    </header>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('daily')">📅 日规划</button>
        <button class="tab-btn" onclick="switchTab('resources')">📚 资源库</button>
        <button class="tab-btn" onclick="switchTab('settings')">⚙️ 设置</button>
    </div>

    <!-- 日规划模块 -->
    <div id="daily" class="section active">
        <h2>今日规划与复盘</h2>
        <div class="input-group">
            <input type="date" id="planDate">
        </div>
        <div class="input-group">
            <textarea id="planContent" placeholder="今天的目标是什么？晚上复盘完成了哪些？..."></textarea>
        </div>
        <button class="action-btn" onclick="addDailyPlan()" id="btn-save-plan">💾 保存今日记录</button>

        <div style="margin-top: 20px; display:flex; justify-content:space-between; align-items:center;">
            <h3>历史记录</h3>
            <input type="text" id="searchPlan" placeholder="搜索关键词..." onkeyup="renderDailyPlans()" style="max-width: 200px;">
        </div>
        <ul id="dailyList" class="item-list"></ul>
    </div>

    <!-- 资源库模块 -->
    <div id="resources" class="section">
        <h2>添加新资源</h2>
        <div class="input-group">
            <input type="text" id="resTitle" placeholder="资源名称 (如：2026战略PPT)">
            <select id="resType">
                <option value="Video">🎬 视频链接</option>
                <option value="PDF">📄 PDF/文档</option>
                <option value="PPT">📊 PPT/演示</option>
                <option value="Link">🔗 其他链接</option>
            </select>
        </div>
        <div class="input-group">
            <input type="url" id="resUrl" placeholder="粘贴链接 (建议先上传到网盘再贴链接)">
        </div>
        <div class="input-group">
            <textarea id="resNote" placeholder="备注说明 (可选)" style="height: 60px;"></textarea>
        </div>
        <button class="action-btn" onclick="addResource()" id="btn-save-res">➕ 添加资源</button>

        <h3>我的资源库</h3>
        <ul id="resourceList" class="item-list"></ul>
    </div>

    <!-- 设置模块 -->
    <div id="settings" class="section">
        <h2>数据存储与维护</h2>
        <p>当前模式：<strong>☁️ Notion 云端同步</strong></p>
        <p>所有数据实时保存在您的 Notion 数据库中。更换设备只需重新输入配置即可同步数据。</p>
        
        <div class="data-controls">
            <button class="secondary-btn" onclick="clearConfig()">🔄 重置配置 (清除 Token)</button>
            <a href="https://notion.so" target="_blank" class="secondary-btn" style="text-decoration:none; display:inline-block;">前往 Notion 查看数据</a>
        </div>
    </div>
</div>

<script>
    // --- 全局变量 ---
    let NOTION_TOKEN = '';
    let NOTION_DB_ID = '';
    
    // 初始化
    window.onload = function() {
        document.getElementById('planDate').valueAsDate = new Date();
        checkConfig();
    };

    function showLoading(show) {
        document.getElementById('loading').style.display = show ? 'flex' : 'none';
        const btns = document.querySelectorAll('.action-btn');
        btns.forEach(b => b.disabled = show);
    }

    // --- 配置管理 ---
    function checkConfig() {
        const t = localStorage.getItem('notion_token');
        const d = localStorage.getItem('notion_db_id');
        if (t && d) {
            NOTION_TOKEN = t;
            NOTION_DB_ID = d;
            document.getElementById('config-panel').style.display = 'none';
            document.getElementById('status-indicator').style.display = 'block';
            fetchData(); // 加载数据
        } else {
            document.getElementById('config-panel').style.display = 'block';
        }
    }

    function saveConfig() {
        const t = document.getElementById('cfg-token').value.trim();
        const d = document.getElementById('cfg-db').value.trim();
        if (!t || !d) return alert('请填写完整的 Token 和 Database ID');
        
        NOTION_TOKEN = t;
        NOTION_DB_ID = d;
        localStorage.setItem('notion_token', t);
        localStorage.setItem('notion_db_id', d);
        
        checkConfig();
    }

    function clearConfig() {
        if(confirm('确定要清除配置吗？清除后数据将无法同步，需重新输入。')) {
            localStorage.removeItem('notion_token');
            localStorage.removeItem('notion_db_id');
            location.reload();
        }
    }

    // --- Notion API 交互核心 ---
    
    async function fetchData() {
        showLoading(true);
        try {
            const res = await fetch(`https://api.notion.com/v1/databases/${NOTION_DB_ID}/query`, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${NOTION_TOKEN}`,
                    'Notion-Version': '2022-06-28',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    sorts: [{ timestamp: "created_time", direction: "descending" }]
                })
            });
            
            if (!res.ok) throw new Error('连接失败，请检查 Token 或数据库权限');
            const data = await res.json();
            renderAll(data.results);
        } catch (e) {
            alert('数据加载失败: ' + e.message);
        } finally {
            showLoading(false);
        }
    }

    async function createPage(properties) {
        showLoading(true);
        try {
            const res = await fetch('https://api.notion.com/v1/pages', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${NOTION_TOKEN}`,
                    'Notion-Version': '2022-06-28',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    parent: { database_id: NOTION_DB_ID },
                    properties: properties
                })
            });
            if (!res.ok) throw new Error('保存失败');
            fetchData(); // 刷新列表
        } catch (e) {
            alert('操作失败: ' + e.message);
        } finally {
            showLoading(false);
        }
    }

    async function deletePage(pageId) {
        if(!confirm('确定删除吗？')) return;
        showLoading(true);
        try {
            await fetch(`https://api.notion.com/v1/blocks/${pageId}`, {
                method: 'DELETE',
                headers: {
                    'Authorization': `Bearer ${NOTION_TOKEN}`,
                    'Notion-Version': '2022-06-28'
                }
            });
            fetchData();
        } catch (e) {
            alert('删除失败');
        } finally {
            showLoading(false);
        }
    }

    // --- 业务逻辑渲染 ---

    function renderAll(items) {
        renderDailyPlans(items);
        renderResources(items);
    }

    function renderDailyPlans(items) {
        const list = document.getElementById('dailyList');
        const search = document.getElementById('searchPlan').value.toLowerCase();
        list.innerHTML = '';
        
        // 过滤出日规划类型
        const plans = items.filter(i => i.properties.Type?.select?.name === 'DailyPlan');
        
        const filtered = plans.filter(p => {
            const title = p.properties.Name?.title[0]?.plain_text || '';
            const content = p.properties.Content?.rich_text[0]?.plain_text || '';
            const date = p.properties.Date?.date?.start || '';
            return title.toLowerCase().includes(search) || content.toLowerCase().includes(search) || date.includes(search);
        });

        filtered.forEach(p => {
            const title = p.properties.Name?.title[0]?.plain_text || '无标题';
            const date = p.properties.Date?.date?.start || '未知日期';
            const content = p.properties.Content?.rich_text[0]?.plain_text || '';
            
            const li = document.createElement('li');
            li.className = 'item-card';
            li.innerHTML = `
                <div class="item-content">
                    <div class="item-date">📅 ${date}</div>
                    <div class="item-title">${title}</div>
                    <div class="item-text">${content}</div>
                </div>
                <div class="item-actions">
                    <button class="delete-btn" onclick="deletePage('${p.id}')">删除</button>
                </div>
            `;
            list.appendChild(li);
        });
    }

    function renderResources(items) {
        const list = document.getElementById('resourceList');
        list.innerHTML = '';
        
        const resources = items.filter(i => i.properties.Type?.select?.name === 'Resource');
        const typeMap = { 'Video': '🎬 视频', 'PDF': '📄 文档', 'PPT': '📊 PPT', 'Link': '🔗 链接' };
        const colorMap = { 'Video': '#e0e7ff', 'PDF': '#fce7f3', 'PPT': '#fef3c7', 'Link': '#f3f4f6' };

        resources.forEach(r => {
            const title = r.properties.Name?.title[0]?.plain_text || '无标题';
            const type = r.properties.Type?.select?.name;
            const url = r.properties.URL?.url;
            const note = r.properties.Content?.rich_text[0]?.plain_text || '';
            
            const li = document.createElement('li');
            li.className = 'item-card';
            li.innerHTML = `
                <div class="item-content">
                    <div class="item-title">
                        <span class="tag" style="background:${colorMap[type] || '#eee'}">${typeMap[type] || type}</span>
                        ${title}
                    </div>
                    <div class="item-text" style="font-size:0.9em">${note}</div>
                    ${url ? `<a href="${url}" target="_blank" class="link-btn">🔗 访问资源 &rarr;</a>` : ''}
                </div>
                <div class="item-actions">
                    <button class="delete-btn" onclick="deletePage('${r.id}')">删除</button>
                </div>
            `;
            list.appendChild(li);
        });
    }

    // --- 用户操作 ---

    function switchTab(tabId) {
        document.querySelectorAll('.section').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.target.classList.add('active');
    }

    function addDailyPlan() {
        const date = document.getElementById('planDate').value;
        const content = document.getElementById('planContent').value;
        if (!date || !content) return alert("请填写日期和内容");

        const properties = {
            "Name": { title: [{ text: { content: `规划：${date}` } }] },
            "Type": { select: { name: "DailyPlan" } },
            "Date": { date: { start: date } },
            "Content": { rich_text: [{ text: { content: content } }] }
        };
        
        createPage(properties);
        document.getElementById('planContent').value = '';
    }

    function addResource() {
        const title = document.getElementById('resTitle').value;
        const type = document.getElementById('resType').value;
        const url = document.getElementById('resUrl').value;
        const note = document.getElementById('resNote').value;

        if (!title || !url) return alert("请填写名称和链接");

        const properties = {
            "Name": { title: [{ text: { content: title } }] },
            "Type": { select: { name: "Resource" } },
            "URL": { url: url },
            "Tags": { multi_select: [{ name: type }] }, // 利用 Tags 存类型
            "Content": { rich_text: [{ text: { content: note || '' } }] }
        };
        
        createPage(properties);
        document.getElementById('resTitle').value = '';
        document.getElementById('resUrl').value = '';
        document.getElementById('resNote').value = '';
        alert("添加成功！");
    }
</script>

</body>
</html>
